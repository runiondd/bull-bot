[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
    --import-mode=importlib
markers =
    unit: fast, no I/O, no network, pure-function tests
    integration: exercises multiple modules, may hit SQLite/tmp dirs
    slow: tests that take > 1s, skipped in default CI
    network: needs a live API endpoint (manual only)
    llm: makes real LLM calls (manual only — costs money)
filterwarnings =
    error
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:pandas.*
